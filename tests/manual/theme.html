<!doctype html><meta charset="utf-8">
<link rel="stylesheet" href="/styles.css">
<button id="tog">toggle theme</button>
<pre id="out"></pre>
<script type="module">
  import { Theme } from '/static/demo-kit/theme.js';
  const out = document.getElementById('out');
  const show = (t) => out.textContent = JSON.stringify(t, null, 2);
  show(Theme.tokens());
  Theme.onChange(show);
  document.getElementById('tog').onclick = () => {
    const r = document.documentElement;
    r.setAttribute('data-theme', r.getAttribute('data-theme') === 'dark' ? '' : 'dark');
    window.dispatchEvent(new CustomEvent('themechange'));
  };
</script>
